name: plugin

# Builds the distributable 3ds Max ApplicationPlugins bundle (zip) AND the dual-scope WiX MSI
# installer, attaching both to a GitHub Release. Triggered by a `plugin-v*` tag; can also be run
# manually (produces a 0.0.0-dev artifact without a release). The MSI ProductVersion is the tag
# version with any -beta suffix stripped (MSI versions are numeric); the file name keeps the suffix.
#
# The build needs no 3ds Max install, but it DOES need the Autodesk.Max managed SDK assembly, which
# is proprietary and not committed here (this repo is going open-source; the Autodesk EULA bars
# public redistribution). It lives in the private companion repo OmnibusCloud/3ds-Max-SDK; the
# workflow checks that out with a read-only token (repo secret SDK_REPO_TOKEN) and copies
# 2027/Autodesk.Max.dll into Libs/ before building. The matching .deps.json / .xml metadata are
# committed here, so only the DLL is fetched.
#
# SIGNING (SSL.com eSigner, quota-limited — we sign the necessary MINIMUM): the MAIN plugin
# assembly is signed once inside the staged bundle (so the signed file flows into both the zip and
# the MSI harvest), then the MSI itself — 2 signing operations per release. Gated like the desktop
# client: internal iteration tags (-dev/-test/-internal) skip signing; -beta/-rc/stable sign.
# Secrets: ESIGNER_USERNAME / ESIGNER_PASSWORD / ESIGNER_CREDENTIAL_ID / ESIGNER_TOTP_SECRET —
# absent secrets degrade to an UNSIGNED build with a warning. The legacy PFX path in
# Build-...Package.ps1 (WINDOWS_CERT_PFX_BASE64) remains as an offline fallback.

on:
  push:
    tags:
      - 'plugin-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Autodesk.Max.dll is proprietary and not committed (repo is going open-source). It lives in
      # the private companion repo OmnibusCloud/3ds-Max-SDK; check it out with a read-only token and
      # copy the DLL into Libs/. The csproj references it via Exists(Libs/...), so the plugin project
      # can only compile once it is present.
      - name: Check SDK access token
        shell: bash
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          if [ -z "${SDK_REPO_TOKEN:-}" ]; then
            echo "::error::SDK_REPO_TOKEN secret is not set. Create a read-only token (contents:read on OmnibusCloud/3ds-Max-SDK) and add it as the SDK_REPO_TOKEN repository secret so CI can fetch Autodesk.Max.dll."
            exit 1
          fi

      - name: Checkout 3ds Max managed SDK (private companion repo)
        uses: actions/checkout@v4
        with:
          repository: OmnibusCloud/3ds-Max-SDK
          token: ${{ secrets.SDK_REPO_TOKEN }}
          path: .sdk

      - name: Stage Autodesk.Max.dll
        shell: bash
        run: |
          set -euo pipefail
          SRC=.sdk/2027/Autodesk.Max.dll
          DEST=OutWit.Render.3dsMax.Plugin/Libs/Autodesk.Max.dll
          if [ ! -f "$SRC" ]; then echo "::error::$SRC not found in the SDK repo"; exit 1; fi
          cp "$SRC" "$DEST"
          SIZE=$(stat -c%s "$DEST")
          if [ "$SIZE" -lt 100000 ]; then echo "::error::staged Autodesk.Max.dll is only $SIZE bytes"; exit 1; fi
          echo "Staged Autodesk.Max.dll ($SIZE bytes)."

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -like 'plugin-v*') { $version = $ref -replace '^plugin-v', '' } else { $version = '0.0.0-dev' }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Package version: $version"

      - name: Build plugin bundle
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: ./OutWit.Render.3dsMax.Plugin/Scripts/Build-OutWit.Render.3dsMax.Plugin.Package.ps1 -Configuration Release -Version "${{ steps.ver.outputs.version }}" -OutputDirectory dist

      # eSigner operations are quota-limited: sign public release tags only (-beta/-rc/stable);
      # -dev/-test/-internal iteration tags and dispatch builds ship unsigned. No-op w/o secrets.
      - name: Decide signing
        id: signgate
        shell: bash
        env:
          ESIGNER_USERNAME: ${{ secrets.ESIGNER_USERNAME }}
        run: |
          set -euo pipefail
          should=false
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            case "${{ github.ref_name }}" in
              *-dev*|*-test*|*-internal*) : ;;   # internal iteration tag → save quota
              *) should=true ;;                  # public release (-beta / -rc / stable) → sign
            esac
          fi
          if [[ -z "${ESIGNER_USERNAME:-}" ]]; then
            [[ "$should" == "true" ]] && echo "::warning::Signing requested but ESIGNER_* secrets are not set — shipping UNSIGNED."
            should=false
          fi
          echo "should_sign=$should" >> "$GITHUB_OUTPUT"
          echo "should_sign=$should"

      # Sign ONLY the main plugin assembly (the DLL 3ds Max loads) INSIDE the staged bundle, so one
      # signing operation covers both the zip and the MSI harvest. CodeSignTool refuses
      # output_path == input dir, so sign into a temp dir and copy back.
      - name: Sign main plugin assembly (SSL.com eSigner)
        if: steps.signgate.outputs.should_sign == 'true'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: ${{ github.workspace }}/obj/plugin-package/OmnibusCloud.3dsMax.Plugin/Contents/bin/OmnibusCloud.3dsMax.Plugin.dll
          output_path: ${{ runner.temp }}\signed-dll
          malware_block: 'false'
          environment_name: PROD

      - name: Re-zip the bundle with the signed assembly
        if: steps.signgate.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          $signed = Join-Path "${{ runner.temp }}" "signed-dll/OmnibusCloud.3dsMax.Plugin.dll"
          if (-not (Test-Path $signed)) { throw "Signed assembly not found at $signed" }
          Copy-Item $signed "obj/plugin-package/OmnibusCloud.3dsMax.Plugin/Contents/bin/OmnibusCloud.3dsMax.Plugin.dll" -Force
          $zip = "dist/OmnibusCloud.3dsMax.Plugin-${{ steps.ver.outputs.version }}.zip"
          Remove-Item $zip -Force
          Compress-Archive -Path "obj/plugin-package/OmnibusCloud.3dsMax.Plugin" -DestinationPath $zip -Force
          Write-Host "Bundle re-zipped with the signed assembly."

      # The MSI harvests the same staged bundle the zip was built from (obj/plugin-package/...) —
      # AFTER the assembly signing, so the installer carries the signed DLL. Dual scope per
      # ship-plan decision D3; overwrite semantics = MajorUpgrade + folder wipe.
      - name: Build MSI installer
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $msiVersion = ($version -split '-')[0]
          dotnet build Setup -c Release -t:Rebuild -p:ProductVersion=$msiVersion
          if ($LASTEXITCODE -ne 0) { throw "MSI build failed." }
          Rename-Item dist/OmnibusCloud-3dsMax-Plugin.msi "OmnibusCloud-3dsMax-Plugin-$version.msi"
          Get-ChildItem dist

      # program_name is MSI-specific: it becomes the signature's program name, which is what the
      # UAC elevation prompt displays. Without it UAC falls back to the randomly named cached copy
      # (C:\Windows\Installer\<hex>.msi) and users see gibberish instead of the product name.
      - name: Sign MSI installer (SSL.com eSigner)
        if: steps.signgate.outputs.should_sign == 'true'
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          program_name: OmnibusCloud 3ds Max Plugin
          file_path: ${{ github.workspace }}/dist/OmnibusCloud-3dsMax-Plugin-${{ steps.ver.outputs.version }}.msi
          output_path: ${{ runner.temp }}\signed-msi
          malware_block: 'false'
          environment_name: PROD

      - name: Replace MSI with the signed copy
        if: steps.signgate.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          $signed = Join-Path "${{ runner.temp }}" "signed-msi/OmnibusCloud-3dsMax-Plugin-${{ steps.ver.outputs.version }}.msi"
          if (-not (Test-Path $signed)) { throw "Signed MSI not found at $signed" }
          Move-Item $signed "dist/OmnibusCloud-3dsMax-Plugin-${{ steps.ver.outputs.version }}.msi" -Force
          Write-Host "MSI replaced with the signed copy."

      # Guards the bundle layout: PackageContents.xml at the package root and the plugin assembly in
      # Contents/bin. Filename-only matching is separator-agnostic (Compress-Archive entry separators
      # differ across PowerShell versions).
      - name: Verify bundle layout
        shell: bash
        run: |
          set -euo pipefail
          ZIP=$(ls dist/*.zip | head -1)
          echo "Package: $ZIP"
          unzip -l "$ZIP" | sed -n '1,20p'
          NAMES=$(unzip -l "$ZIP" | awk '{print $4}' | tr '\\' '/')
          echo "$NAMES" | grep -qx 'OmnibusCloud.3dsMax.Plugin/PackageContents.xml' \
            || { echo "::error::PackageContents.xml is not at the bundle root"; exit 1; }
          echo "$NAMES" | grep -qx 'OmnibusCloud.3dsMax.Plugin/Contents/bin/OmnibusCloud.3dsMax.Plugin.dll' \
            || { echo "::error::plugin assembly missing from Contents/bin"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-win-x64
          path: |
            dist/*.zip
            dist/*.msi
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/plugin-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.msi' \) -exec cp {} release/ \;
          cd release
          sha256sum *.zip *.msi > SHA256SUMS
          echo "=== SHA256SUMS ==="; cat SHA256SUMS

      - name: Attach plugin bundle to the release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
